name: FirstStep
options:
  bundleIdPrefix: com.firststep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  FirstStepApp:
    type: application
    platform: iOS
    sources:
      - path: FirstStep
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.firststep.app
        INFOPLIST_FILE: FirstStep/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: FirstStep/App/FirstStep.entitlements
        PRODUCT_NAME: "First Step"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "YES"
    entitlements:
      path: FirstStep/App/FirstStep.entitlements
      properties:
        com.apple.developer.healthkit: true
